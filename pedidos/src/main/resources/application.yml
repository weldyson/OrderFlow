spring:
  application:
    name: icompraspedidos
  datasource:

    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/icompraspedidos}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

  OrderFlow:
    pedidos:
      clients:
        produtos:
          url: ${PRODUTOS_URL:http://localhost:8081/produtos}
        clientes:
            url: ${CLIENTES_URL:http://localhost:8082/clientes}

